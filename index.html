<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vacu-agenda</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg">
        <link rel="stylesheet" href="styles/style.css">
        <script src="js/index.js" defer></script>
    </head>

    <body>
        <h1>Bitacora</h1>

        <section id="setup-form-container">
            <form id="setup-form">
                <h2>Configuración inicial</h2>

                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" value="Joaquin" required>

                <label for="time_between_shots">¿Cada cuántos días te aplicas las vacunas?</label>
                <input type="number" id="time_between_shots" name="time_between_shots" min="1" value="7" required>

                <label for="initial_arm">Brazo de la primer vacuna</label>
                <input type="text" id="initial_arm" name="initial_arm" value="Izquierdo" required>

                <label for="treatment_start_date">Inicio del tratamiento</label>
                <input type="date" id="treatment_start_date" name="treatment_start_date" required>

                <label for="dose">Dosis (ml)</label>
                <input type="number" id="dose" name="dose" step="any" value="50" required>

                <label for="treatment_duration">Duración del tratamiento (días)</label>
                <input type="number" id="treatment_duration" name="treatment_duration" min="1" value="365" required>

                <button type="submit">Guardar</button>
            </form>
        </section>

        <div id="table-tabs">
            <button id="tab-pending" class="active">Pendientes</button>
            <button id="tab-applied">Aplicadas</button>
        </div>

        <table id="shots_table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Dosis</th>
                    <th>Brazo</th>
                    <th>Aplicada</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <table id="applied_shots_table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Dosis</th>
                    <th>Brazo</th>
                    <th>Aplicada</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <div id="add-row-container">
            <button id="delete-row-btn">−</button>
            <button id="add-row-btn">+</button>
        </div>

        <div id="reset-container">
            <p></p>
            <button id="reset-btn">Reiniciar configuración</button>
        </div>
    </body>
</html>
