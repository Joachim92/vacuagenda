<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>vacu-agenda</title>
        <link rel="icon" type="image/svg+xml" href="favicon.svg">
        <link rel="stylesheet" href="styles/style.css">
        <link rel="apple-touch-icon" href="assets/iphone-icon.png">
        <script src="js/index.js" defer></script>
    </head>

    <body>
        <h1>VacuAgenda</h1>

        <label id="greeting">Hola </label>

        <section id="setup-form-container">
            <form id="setup-form">
                <h2>Configuración inicial</h2>

                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" required>

                <label for="time_between_shots">¿Cada cuántos días te aplicas las vacunas?</label>
                <input type="number" inputmode="numeric" id="time_between_shots" name="time_between_shots" min="1" placeholder="7" required>

                <label for="initial_arm">Brazo de la primer vacuna</label>
                <select id="initial_arm" name="initial_arm" required>
                    <option value="Izquierdo">Izquierdo</option>
                    <option value="Derecho">Derecho</option>
                </select>

                <label for="treatment_start_date">Inicio del tratamiento</label>
                <input type="date" id="treatment_start_date" name="treatment_start_date" required>

                <label for="dose">Dosis (ml)</label>
                <input type="number" inputmode="numeric" id="dose" name="dose" step="any" placeholder="50" required>

                <label for="treatment_duration">Duración del tratamiento (días)</label>
                <input type="number" inputmode="numeric" id="treatment_duration" name="treatment_duration" min="1" placeholder="365" required>

                <button type="submit">Guardar</button>
            </form>
        </section>

        <div id="table-tabs">
            <button id="tab-pending" class="active">Pendientes</button>
            <button id="tab-applied">Aplicadas</button>
        </div>

        <table id="shots_table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Dosis</th>
                    <th>Brazo</th>
                    <th>Aplicada</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <table id="applied_shots_table">
            <thead>
                <tr>
                    <th>Fecha</th>
                    <th>Dosis</th>
                    <th>Brazo</th>
                    <th>Aplicada</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>

        <div id="add-row-container">
            <button id="delete-row-btn">−</button>
            <button id="add-row-btn">+</button>
        </div>

        <div id="reset-container">
            <p></p>
            <button id="reset-btn">Borrar datos</button>
        </div>

        <div id="reminder-container">
            <label for="reminder-time">Hora del recordatorio</label>
            <input type="time" id="reminder-time">
            <button id="export-calendar-btn">Añadir al calendario</button>
        </div>

        <div id="reset-modal" role="dialog" aria-modal="true">
            <div id="reset-modal-box">
                <h3>¿Estás seguro?</h3>
                <p>Esta acción borrará todos los datos del tratamiento. No hay forma de recuperarlos.</p>
                <div id="reset-modal-actions">
                    <button id="reset-cancel-btn">Cancelar</button>
                    <button id="reset-confirm-btn">Sí, borrar todo</button>
                </div>
            </div>
        </div>
    </body>
</html>
